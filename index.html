<!DOCTYPE html>
<html lang="ta">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" file="#008000">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chit Fund App</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f2f2f2
}

/* TOP BAR */
.topbar{
background:#008000;
color:white;
padding:15px;
display:flex;
align-items:center;
font-size:20px;
position:relative;
z-index:999;
}

.menu-btn{
font-size:24px;
margin-right:15px;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
display:none;
width:100%;
height:100%;
top:0;
left:0;
background:rgba(0,0,0,0.4);
z-index:900;
}

/* SIDE MENU */
.sidemenu{
height:100%;
width:0;
position:fixed;
top:0;
left:0;
background:#fff;
overflow-x:hidden;
transition:0.3s;
padding-top:60px;
box-shadow:2px 0 10px rgba(0,0,0,0.3);
z-index:1000;
}

.sidemenu a{
padding:14px 20px;
display:block;
text-decoration:none;
color:black;
font-size:18px;
border-bottom:1px solid #eee;
}

/* PAGES */
.page{
display:none;
padding:15px
}

.active{
display:block
}

/* INPUT */
input,button{
width:100%;
padding:12px;
margin:8px 0;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#008000;
color:white;
border:none;
}

/* CARD */
.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* PLUS */
.plus-btn{
font-size:24px;
background:#008000;
color:white;
width:55px;
height:55px;
border-radius:50%;
text-align:center;
line-height:55px;
position:fixed;
right:20px;
bottom:20px;
z-index:500;
}
/* CALCULATOR TABLE FIX */
table{
width:100%;
border-collapse:collapse;
margin-top:10px;
background:white;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#f2f2f2;
font-weight:bold;
}
.menu3{
float:right;
font-size:22px;
cursor:pointer;
}
.popup{
position:absolute;
right:10px;
top:35px;
background:white;
border-radius:12px;
display:none;
z-index:50;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
min-width:160px;
overflow:hidden;
animation:popupFade 0.2s ease;
}

.popup div{
padding:14px;
cursor:pointer;
font-size:16px;
border-bottom:1px solid #eee;
font-weight:500;
}

.popup div:last-child{
border-bottom:none;
}

.popup div:hover{
background:#f0f8f0;
color:#008000;
}

@keyframes popupFade{
from{transform:scale(0.8);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.paid-emi{
background:#d4edda;
border-left:6px solid #28a745;
}
.unselect-preview{
background:#e2e3e5;
border-left:6px solid #6c757d;
}
.chitPopup{
position:absolute;
right:15px;
top:35px;
background:white;
border:1px solid #ccc;
border-radius:6px;
display:none;
z-index:20;
}
.crown-inline{
margin-left:6px;
font-size:18px;
}
</style>
</head>
<div id="confirmBox" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:9999;">

<div style="
background:white;
padding:20px;
border-radius:10px;
width:80%;
text-align:center;">

<p id="confirmText"></p>

<button onclick="confirmNo()">Cancel</button>
<button onclick="confirmYes()">Remove</button>

</div>
</div>
<body>

<!-- APP -->
<div id="appPage">

<div class="topbar">
<span class="menu-btn" onclick="openMenu()">☰</span>
Chit Fund Application
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>

<div id="myMenu" class="sidemenu">
<a onclick="showPage('homePage')">Home</a>

</div>

<h2>Closed Chits</h2>
<div id="closedChitList"></div>
</div>

<h2>Finance Loan</h2>

<div id="loanList"></div>

<div class="plus-btn" onclick="loanForm.style.display='block'">+</div>

<div id="loanForm" style="display:none">

<input id="loanName" placeholder="Finance Name">
<input id="loanAmount" type="number" placeholder="Loan Amount">
<input id="loanInterest" type="number" placeholder="Interest %">
<input id="loanDate" type="date">

<button onclick="saveLoan()">Save Loan</button>

<h2>Pay EMI</h2>

<select id="loanPayDate"></select>

<button onclick="paySelectedEMI()">Pay EMI</button>

</div>

</div>

<!-- MY CHITS -->
<!-- HOME PAGE -->
<!-- HOME PAGE -->
<div id="homePage" class="page active">

<label>Chit Amount</label>
<input id="amount" type="number" value="500000">

<label>Current Month</label>
<input id="currentMonth" type="number" value="1">

<label>Total Months</label>
<input id="months" type="number" value="20">

<label>Commission %</label>
<input id="commission" type="number" value="3">

<label>Members</label>
<input id="members" type="number" value="20">

<div id="output"></div>

</div>
<div id="myChitsPage" class="page">
<h2>My Chits</h2>

<div id="chitList"></div>

<div class="plus-btn" onclick="formArea.style.display='block'">+</div>

<div id="formArea" style="display:none;">
<input id="chitName" placeholder="Chit Name">
<input id="chitAmount" type="number" placeholder="Amount">
<input id="chitCommission" type="number" placeholder="Commission %">
<input id="chitMonths" type="number" placeholder="Months">
<input id="chitMembers" type="number" placeholder="Members">
<input id="chitStartDate" type="date">
<button onclick="addChit()">Add Chit</button>
</div>

</div>

<!-- DETAILS -->
<div id="detailPage" class="page">
<h2 id="detailTitle"></h2>
<div id="monthInputs"></div>
<button onclick="showPage('myChitsPage')">Back</button>
</div>

</div>

<script>
let confirmCallback = null;

function showConfirm(message, callback){
confirmText.innerText = message;
confirmBox.style.display = "flex";
confirmCallback = callback;
}

function confirmYes(){
confirmBox.style.display = "none";
if(confirmCallback) confirmCallback(true);
}

function confirmNo(){
confirmBox.style.display = "none";
if(confirmCallback) confirmCallback(false);
}

let currentUser="defaultUser";
let tempReceivingMonth = {};
let tempRemoveReceiving = {};
/* PAGE SWITCH */
function showPage(id){
document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById(id)
.classList.add("active");

closeMenu();
}

/* MENU */
function openMenu(){
myMenu.style.width="250px";
overlay.style.display="block";
}

function closeMenu(){
myMenu.style.width="0";
overlay.style.display="none";
}

/* BACK */
function back(){
showPage('myChitsPage');
}

/* FORM */
function showForm(){
formArea.style.display="block";
}

/* STORAGE */
function getChits(){
let data=localStorage.getItem("chits_"+currentUser);
return data?JSON.parse(data):[];
}

/* ADD CHIT */
function addChit(){

let chits=getChits();

chits.push({
name:chitName.value,
amount:chitAmount.value,
commission:chitCommission.value,
months:chitMonths.value,
members:chitMembers.value,
startDate:chitStartDate.value
});

localStorage.setItem(
"chits_"+currentUser,
JSON.stringify(chits));

loadChits();
formArea.style.display="none";
}

/* LOAD CHITS */
function loadChits(){

let html="";

getChits().forEach((c,index)=>{

if(isChitClosed(index)) return;

html+=`
<div class="card"
onclick="viewChit(${index})"
style="position:relative;">
<span class="menu3"
onclick="event.stopPropagation();toggleChitMenu(${index})">
⋮
</span>

<div id="chitPopup_${index}" class="chitPopup">

<div onclick="deleteChit(${index})">
Delete Chit
</div>

</div>

<h3>${c.name}</h3>

<p>Amount: ₹${c.amount}</p>
<p>Months: ${c.months}</p>

</div>
`;

});

chitList.innerHTML=html;
}

/* VIEW CHIT */
function viewChit(index){

let c=getChits()[index];

showPage('detailPage');
detailTitle.innerText=c.name+" - Details";

let html="";
let start=new Date(c.startDate);

for(let i=0;i<c.months;i++){

let d=new Date(start);
d.setMonth(start.getMonth()+i);

let monthName=d.toLocaleString(
'default',{month:'long',year:'numeric'});

html+=`

<div class="card"
id="card_${index}_${i}"
style="position:relative;">


<span class="menu3"
onclick="event.stopPropagation();toggleMenu(${index},${i})">⋮</span>

<div id="popup_${index}_${i}" class="popup">

<div onclick="saveEMI(${index},${i})">Save</div>

<div onclick="editEMI(${index},${i})">Edit</div>
<div onclick="payEMI(${index},${i})">
Pay EMI
</div>

<div onclick="setReceiving(${index},${i})">
Receiving Month
</div>


</div>

<label style="color:#dc3545; font-weight:bold;">
Month ${i+1} - ${monthName}
</label>

<input type="number"
id="emi_${index}_${i}"
placeholder="EMI"
oninput="calculateAll(${index},${i},this)">

<input type="number"
id="interest_${index}_${i}"
placeholder="Interest Rate %"
readonly>

<input type="number"
id="taking_${index}_${i}"
placeholder="Taking Money"
readonly>
<div id="paymentArea_${index}_${i}"
style="display:none"
onclick="event.stopPropagation();">

<input type="number"
id="paidAmount_${index}_${i}"
placeholder="Paid Amount">

<input type="date"
id="paidDate_${index}_${i}">

<button type="button"
onclick="savePayment(${index},${i})">
Save Payment
</button>
<div id="paymentHistory_${index}_${i}"
style="margin-top:10px;font-size:14px;color:#333">
</div>

</div>

</div>
`;
}

html+=`
<div class="card">
<h3>Total EMI Paid :
₹ <span id="totalPaid_${index}">0</span>
</h3>
</div>
`;

monthInputs.innerHTML=html;
loadSavedEMI(index);
highlightReceiving(index);
highlightPaidEMI(index);
updateTotalPaid(index);
}


/* =========================
   TAKING + INTEREST
=========================*/

function calculateAll(chitIndex,monthIndex,emiInput){

let emi=parseFloat(emiInput.value);

if(!emi || emi<=0){

document.getElementById(
"taking_"+chitIndex+"_"+monthIndex
).value="";

document.getElementById(
"interest_"+chitIndex+"_"+monthIndex
).value="";

return;
}

let chit=getChits()[chitIndex];

let amount=parseFloat(chit.amount);
let commission=parseFloat(chit.commission);
let members=parseFloat(chit.members);
let totalMonths=parseInt(chit.months);

/* A */
let A=(amount/100)*commission;

/* TAKING */
let takingMoney=(emi*members)-A;

/* ✅ PASTE THIS HERE */
if(takingMoney<=0){

document.getElementById(
"taking_"+chitIndex+"_"+monthIndex
).value="Invalid EMI";

document.getElementById(
"interest_"+chitIndex+"_"+monthIndex
).value="";

return;
}

document.getElementById(
"taking_"+chitIndex+"_"+monthIndex
).value=takingMoney.toFixed(2);

/* INTEREST */

let B=amount-A;

let C=(B*100)/takingMoney;

let balanceMonths=
totalMonths-(monthIndex+1);

if(balanceMonths<=0)
balanceMonths=1;

let interestRate=
(C-100)/balanceMonths;

document.getElementById(
"interest_"+chitIndex+"_"+monthIndex
).value=
interestRate.toFixed(2);

}
/* HOME CALCULATOR */
function calculate(){

let amt=parseFloat(amount.value);
let mths=parseFloat(months.value);
let cur=parseFloat(currentMonth.value);
let comm=parseFloat(commission.value);
let mem=parseFloat(members.value);

if(cur>=mths){
alert("Invalid Month");
return;
}

let A=mths-cur;
let B=(amt/100)*comm;
let C=amt-B;

let table="<table>";
table+="<tr><th>Rate %</th><th>Receive Amount</th><th>EMI</th></tr>";

for(let i=1;i<=30;i++){

let rate=i/10;
let D=(rate*A)+100;
let receive=(C/D)*100;
let payable=(receive+B)/mem;

table+=`
<tr>
<td>${rate.toFixed(1)}%</td>
<td>₹${receive.toFixed(2)}</td>
<td>₹${payable.toFixed(2)}</td>
</tr>`;
}

table+="</table>";

output.innerHTML=table;
}
function saveEMI(chit,month){

let emi=document.getElementById(
"emi_"+chit+"_"+month);

emi.setAttribute("readonly",true);

let interest=document.getElementById(
"interest_"+chit+"_"+month);

let taking=document.getElementById(
"taking_"+chit+"_"+month);

let key="savedEMI_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

if(!data[chit]) data[chit]={};

data[chit][month]={
emi:emi.value,
interest:interest.value,
taking:taking.value
};

localStorage.setItem(
key,
JSON.stringify(data)
);
/* SAVE RECEIVING MONTH ONLY ON SAVE CLICK */
let rkey="receivingMonth_"+currentUser;

let saved=
JSON.parse(localStorage.getItem(rkey))||{};

/* permanent delete */
if(tempRemoveReceiving[chit]){
delete saved[chit];
delete tempRemoveReceiving[chit];
}

/* permanent save */
if(tempReceivingMonth[chit] !== undefined){
saved[chit] = tempReceivingMonth[chit];
delete tempReceivingMonth[chit];
}

localStorage.setItem(
rkey,
JSON.stringify(saved)
);
tempReceivingMonth[chit] = undefined;
highlightReceiving(chit);}
function editEMI(chit,month){

let emi=document.getElementById(
"emi_"+chit+"_"+month);

emi.removeAttribute("readonly");

toggleMenu(chit,month);
}
function loadSavedEMI(chit){

let key="savedEMI_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

if(!data[chit]) return;

for(let m in data[chit]){

let d=data[chit][m];

document.getElementById(
"emi_"+chit+"_"+m).value=d.emi;

document.getElementById(
"interest_"+chit+"_"+m).value=d.interest;

document.getElementById(
"taking_"+chit+"_"+m).value=d.taking;

document.getElementById(
"emi_"+chit+"_"+m)
.setAttribute("readonly",true);
}
}
function setReceiving(chit,month){

let key = "receivingMonth_" + currentUser;
let saved = JSON.parse(localStorage.getItem(key)) || {};

/* permanent receiving */
if(saved[chit] !== undefined){

if(saved[chit] === month){

if(confirm("Remove receiving?")){

if(confirm("Permanently remove receiving?")){

delete saved[chit];
localStorage.setItem(key, JSON.stringify(saved));
highlightReceiving(chit);

}

}

return;
}

/* other month */
alert("Receiving already selected");
return;
}

/* temp receiving */
if(tempReceivingMonth[chit] !== undefined){

if(tempReceivingMonth[chit] === month){

tempReceivingMonth[chit] = undefined;
highlightReceiving(chit);

}else{
alert("Receiving already selected");
}

return;
}

/* new */
tempReceivingMonth[chit] = month;
highlightReceiving(chit);
}

function highlightReceiving(chit){

/* remove all crowns */
document
.querySelectorAll("[id^='card_"+chit+"_'] label")
.forEach(lbl=>{
lbl.innerHTML = lbl.innerHTML.replace(/👑/g,"");
});

/* TEMP crown */
if(tempReceivingMonth[chit] !== undefined){

let lbl=document.querySelector(
"#card_"+chit+"_"+tempReceivingMonth[chit]+" label"
);

if(lbl){
lbl.innerHTML += " 👑";
}

return;
}

/* SAVED crown */
let key="receivingMonth_"+currentUser;

let saved=
JSON.parse(localStorage.getItem(key))||{};

if(saved[chit]===undefined) return;

let lbl=document.querySelector(
"#card_"+chit+"_"+saved[chit]+" label"
);

if(lbl){
lbl.innerHTML += " 👑";
}
}


function toggleMenu(chit,month){

document.querySelectorAll(".popup")
.forEach(p=>p.style.display="none");

let el=document.getElementById(
"popup_"+chit+"_"+month);

el.style.display="block";
}
document.addEventListener("click",function(e){

if(!e.target.classList.contains("menu3")){

/* month popup close */
document.querySelectorAll(".popup")
.forEach(p=>p.style.display="none");

/* chit popup close */
document.querySelectorAll(".chitPopup")
.forEach(p=>p.style.display="none");

}

});
function payEMI(chit,month){

let area=document.getElementById(
"paymentArea_"+chit+"_"+month);

area.style.display="block";

/* load already saved */
loadPayment(chit,month);


document.querySelectorAll(".popup")
.forEach(p=>p.style.display="none");
}
function savePayment(chit,month){
if(!currentUser){
alert("Login again");
return;
}

let amount=document.getElementById(
"paidAmount_"+chit+"_"+month).value;
let emiValue=parseFloat(
document.getElementById(
"emi_"+chit+"_"+month
).value || 0
);

let paidAmount=parseFloat(amount || 0);

if(paidAmount > emiValue){
alert("Paid amount cannot exceed EMI amount");
return;
}

let date=document.getElementById(
"paidDate_"+chit+"_"+month).value;

if(!amount || !date){
alert("Enter Amount & Date");
return;
}

let key="emiPayment_"+currentUser;

let data=JSON.parse(localStorage.getItem(key))||{};

if(!data[chit]) data[chit]={};

if(!data[chit][month])
data[chit][month]=[];

data[chit][month].push({
amount:amount,
date:date
});

localStorage.setItem(
key,
JSON.stringify(data));

alert("Payment Saved ✅");

/* close payment box */
document.getElementById(
"paymentArea_"+chit+"_"+month
).style.display="none";

/* reload history */
loadPayment(chit,month);
highlightPaidEMI(chit);
updateTotalPaid(chit);
}
function loadPayment(chit,month){

let key="emiPayment_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

let historyDiv=document.getElementById(
"paymentHistory_"+chit+"_"+month);

if(!historyDiv) return;

historyDiv.innerHTML="";

if(!data[chit] || !data[chit][month]) return;

let list=data[chit][month];

let total=0;
let html="<b>Payment History</b><br>";

list.forEach((p,i)=>{

total+=parseFloat(p.amount||0);

html+=`
₹${p.amount} - ${p.date}
<span style="color:red;
cursor:pointer;
margin-left:10px;"
onclick="deletePayment(${chit},${month},${i})">
❌
</span><br>
`;

});

let emiInput=document.getElementById(
"emi_"+chit+"_"+month
);

let emiValue=parseFloat(
emiInput.value || 0
);

let balance = emiValue - total;

/* SHOW PAYMENT */
let resultHTML =
html + "<hr>Total Paid : ₹"+total;

/* BALANCE SHOW ONLY IF PENDING */
if(balance>0){
resultHTML +=
"<br><b style='color:red'>Balance : ₹"
+ balance.toFixed(2) +
"</b>";
}

historyDiv.innerHTML=resultHTML;

/* ✅ highlight refresh */
highlightPaidEMI(chit);
}

function highlightPaidEMI(chit){

let key="emiPayment_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

if(!data[chit]) return;

for(let m in data[chit]){

let total=0;

data[chit][m].forEach(p=>{
total+=parseFloat(p.amount||0);
});

let emiInput=document.getElementById(
"emi_"+chit+"_"+m
);

if(!emiInput) continue;

let emiValue=parseFloat(
emiInput.value || 0
);

if(total>=emiValue){

let card=document.getElementById(
"card_"+chit+"_"+m
);

if(card)
card.classList.add("paid-emi");
}
}
}
function deleteChit(index){

if(!confirm("⚠️ This cannot be undone!\nDelete Chit?")){
return;
}

let chits=getChits();

/* remove chit */
chits.splice(index,1);

localStorage.setItem(
"chits_"+currentUser,
JSON.stringify(chits)
);

/* ===== FIX DATA INDEX ===== */

function reIndex(key){

let data=
JSON.parse(localStorage.getItem(key))||{};

let newData={};

Object.keys(data).forEach(k=>{

k=parseInt(k);

if(k<index){
newData[k]=data[k];
}
else if(k>index){
newData[k-1]=data[k];
}

});

localStorage.setItem(
key,
JSON.stringify(newData)
);
}

reIndex("savedEMI_"+currentUser);
reIndex("emiPayment_"+currentUser);
reIndex("receivingMonth_"+currentUser);

/* refresh */
loadChits();

alert("✅ Chit Deleted Safely");
}
function toggleChitMenu(index){

document.querySelectorAll(".chitPopup")
.forEach(p=>p.style.display="none");

let el=document.getElementById(
"chitPopup_"+index
);

el.style.display="block";
}
function deletePayment(chit,month,pIndex){

if(!confirm("Delete this payment?"))
return;

let key="emiPayment_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

data[chit][month].splice(pIndex,1);

/* remove empty month */
if(data[chit][month].length===0){
delete data[chit][month];
}

localStorage.setItem(
key,
JSON.stringify(data)
);

/* reload */
loadPayment(chit,month);
highlightPaidEMI(chit);
}
function updateTotalPaid(chit){

let key="emiPayment_"+currentUser;

let data=
JSON.parse(localStorage.getItem(key))||{};

let total=0;

if(data[chit]){

Object.values(data[chit]).forEach(month=>{
month.forEach(p=>{
total+=parseFloat(p.amount||0);
});
});

}

let el=document.getElementById(
"totalPaid_"+chit
);

if(el) el.innerText=total.toFixed(2);
}
function isChitClosed(chitIndex){

let chit=getChits()[chitIndex];
let totalMonths=parseInt(chit.months);

let key="emiPayment_"+currentUser;
let data=JSON.parse(localStorage.getItem(key))||{};

if(!data[chitIndex]) return false;

for(let i=0;i<totalMonths;i++){

let emiInput=document.getElementById("emi_"+chitIndex+"_"+i);
let emiValue=emiInput ? parseFloat(emiInput.value||0) : 0;

let paidTotal=0;

if(data[chitIndex][i]){
data[chitIndex][i].forEach(p=>{
paidTotal+=parseFloat(p.amount||0);
});
}

if(paidTotal < emiValue){
return false;
}
}

return true;
}
function loadClosedChits(){

let html="";
let chits=getChits();

chits.forEach((c,index)=>{

if(isChitClosed(index)){

html+=`
<div class="card"
onclick="viewChit(${index})"
style="cursor:pointer">

<h3>${c.name}</h3>
<p>Amount: ₹${c.amount}</p>
<p>Months: ${c.months}</p>
<p style="color:green;font-weight:bold">
✅ Closed
</p>

</div>
`;

}

});

closedChitList.innerHTML=html || "No Closed Chits";

}

function deleteLoan(index){

if(!confirm("Delete this loan?")) return;

let loans=getLoans();
loans.splice(index,1);

localStorage.setItem(
"loans_"+currentUser,
JSON.stringify(loans)
);

loadLoans();

}




function isLoanFullyPaid(index){

let loans = getLoans();
let emiList = generateLoanEMI(loans[index]);

let key = "loanPaid_" + currentUser;
let data = JSON.parse(localStorage.getItem(key)) || {};

if(!data[index]) return false;

for(let emi of emiList){

if(!data[index][emi.date]){
return false;
}

}

return true;
}
function getLoans(){
let data=localStorage.getItem("loans_"+currentUser);
return data?JSON.parse(data):[];
}

function saveLoan(){

let loans=getLoans();

loans.push({
name:loanName.value,
amount:parseFloat(loanAmount.value),
interest:parseFloat(loanInterest.value),
date:loanDate.value
});

localStorage.setItem(
"loans_"+currentUser,
JSON.stringify(loans)
);

loanForm.style.display="none";
loadLoans();

}
function generateLoanEMI(loan){

let list=[];

let start=new Date(loan.date);
start.setMonth(start.getMonth()+1);

let today=new Date();

let days=new Date(
start.getFullYear(),
start.getMonth()+1,0
).getDate();

let interest=(loan.amount/100)*loan.interest;
let emi=(interest/30)*days;

list.push({
date:start.toISOString().split("T")[0],
emi:parseFloat(emi.toFixed(2)),
future:start>today
});

return list;
}
function openLoanPay(index,date){

let key="loanPaid_"+currentUser;
let data=JSON.parse(localStorage.getItem(key))||{};

let loans=getLoans();
let emiList=generateLoanEMI(loans[index]);

let emiObj=emiList.find(e=>e.date==date);

let prevPaid = data[index] && data[index][date]
? parseFloat(data[index][date])
: 0;

let balance = emiObj.emi - prevPaid;

let amt=prompt("Balance ₹"+balance+" Enter Amount");

if(!amt) return;

amt=parseFloat(amt);

if(amt>balance){
alert("Cannot pay more than balance");
return;
}

if(!data[index]) data[index]={};

data[index][date]= prevPaid + amt;

localStorage.setItem(key,JSON.stringify(data));

alert("Payment Saved ✅");

loadLoans();
}
function toggleLoanMenu(index){

document.querySelectorAll(".popup")
.forEach(p=>p.style.display="none");

let el=document.getElementById("loanPopup_"+index);
if(el) el.style.display="block";

}
function loadLoans(){

let html="";
let loans=getLoans();

let paid=JSON.parse(
localStorage.getItem("loanPaid_"+currentUser)
)||{};

loans.forEach((l,index)=>{

let emiList = generateLoanEMI(l);

let full = true;
let emiHTML="";

emiList.forEach(e=>{

let paidAmt = paid[index] && paid[index][e.date];
let balance = e.emi - (paidAmt || 0);

/* IMPORTANT FIX */
if(e.future){
full=false;
}

if(paidAmt >= e.emi){
return;
}

if(!paidAmt || paidAmt < e.emi){
full=false;
}

emiHTML += `
<div style="padding:8px;border-bottom:1px solid #eee">

<span onclick="openLoanPay(${index},'${e.date}')"
style="cursor:pointer">
${e.date} → ₹${e.emi}
</span>

<span onclick="deleteLoanEMI(${index},'${e.date}')"
style="float:right;color:red;cursor:pointer">
❌
</span>

<br>
<span style="color:red;font-size:14px">
Balance: ₹${balance.toFixed(2)}
</span>

</div>
`;

});

html+=`
<div class="card" style="position:relative;background:${full?'#d4edda':'#f8d7da'}">

<span class="menu3"
onclick="event.stopPropagation();toggleLoanMenu(${index})">⋮</span>

<div id="loanPopup_${index}" class="popup">
<div onclick="deleteLoan(${index})">Delete</div>
</div>

<h3>${l.name}</h3>
<p>Amount: ₹${l.amount}</p>
<p>Interest: ${l.interest}%</p>
<p>Date: ${l.date}</p>

<b>EMI Due</b>
${emiHTML}

</div>`;
});

loanList.innerHTML=html;
}
function deleteLoanEMI(index,date){

let key="loanPaid_"+currentUser;
let data=JSON.parse(localStorage.getItem(key))||{};

if(data[index] && data[index][date]){

if(confirm("Delete EMI payment?")){

delete data[index][date];

localStorage.setItem(key,JSON.stringify(data));

loadLoans();

}

}

}
